<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="dark"] {
  --bg: #080e18;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.07);
  --surfaceHover: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f6ff;
  --text2: rgba(180,205,235,0.6);
  --text3: rgba(140,170,210,0.35);
  --accent: #f5a623;
  --blue: #5bc8f5;
  --green: #34d399;
  --glow1: rgba(91,200,245,0.18);
  --glow2: rgba(138,100,255,0.12);
  --glow3: rgba(255,166,35,0.08);
}
[data-theme="light"] {
  --bg: #e8f0fa;
  --surface: rgba(255,255,255,0.65);
  --surface2: rgba(255,255,255,0.4);
  --surfaceHover: rgba(255,255,255,0.8);
  --border: rgba(0,50,120,0.08);
  --border2: rgba(0,50,120,0.14);
  --text: #0d1f35;
  --text2: rgba(30,70,120,0.55);
  --text3: rgba(30,70,120,0.3);
  --accent: #e08c00;
  --blue: #0284c7;
  --green: #059669;
  --glow1: rgba(2,132,199,0.1);
  --glow2: rgba(100,80,200,0.06);
  --glow3: rgba(224,140,0,0.06);
}

html, body { height: 100%; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s;
}

/* ── GLOW ── */
.glow-layer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}
.glow-top {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: 340px; height: 340px; border-radius: 50%;
  background: radial-gradient(circle, var(--glow1) 0%, transparent 70%);
  filter: blur(10px);
}
.glow-mid {
  position: absolute; top: 40px; left: -60px;
  width: 260px; height: 260px; border-radius: 50%;
  background: radial-gradient(circle, var(--glow2) 0%, transparent 70%);
  filter: blur(20px);
}
.glow-right {
  position: absolute; top: 80px; right: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, var(--glow3) 0%, transparent 70%);
  filter: blur(16px);
}

.nav, .hero-wrap, .today-panel, .week-section, #loading { position: relative; z-index: 1; }

/* ── NAV ── */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: max(env(safe-area-inset-top,0px),16px) 20px 12px;
}
.loc-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; padding: 7px 14px 7px 10px;
  cursor: pointer; color: var(--text);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: background 0.2s;
}
.loc-btn:hover { background: var(--surfaceHover); }
.loc-btn svg { color: var(--blue); }
.loc-btn-text { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; }

.theme-btn {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: transform 0.2s;
}
.theme-btn:hover { transform: scale(1.1); }

/* ── HERO ── */
.hero-wrap { padding: 12px 24px 24px; text-align: center; }
.hero-icon { font-size: 76px; line-height: 1; margin-bottom: 8px; filter: drop-shadow(0 0 32px var(--glow1)); }
.hero-temp {
  font-size: 116px; font-weight: 300; letter-spacing: -0.04em; line-height: 1;
  text-shadow: 0 0 80px var(--glow1);
}
.hero-temp sup { font-size: 0.34em; vertical-align: top; margin-top: 0.45em; font-weight: 300; color: var(--text2); }
.hero-cond { font-size: 17px; color: var(--text2); margin-top: 10px; }
.hero-hilo { font-size: 13px; color: var(--text3); margin-top: 5px; }

/* ── TODAY PANEL ── */
.today-panel {
  margin: 0 16px 8px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
}

/* Stats row */
.today-stats {
  display: flex; border-bottom: 1px solid var(--border);
}
.today-stat {
  flex: 1; padding: 18px 8px; text-align: center;
  border-right: 1px solid var(--border);
}
.today-stat:last-child { border-right: none; }
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; }
.stat-val { font-size: 18px; font-weight: 600; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

/* Sun row */
.today-sun {
  display: flex;
  border-top: 1px solid var(--border);
}
.sun-cell {
  flex: 1; display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-right: 1px solid var(--border);
}
.sun-cell:last-child { border-right: none; }
.sun-cell-icon { font-size: 22px; }
.sun-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
.sun-cell-time { font-size: 17px; font-weight: 600; margin-top: 3px; }

/* Hourly */
.today-hourly-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text3); padding: 14px 18px 8px;
}
.hourly-scroll { overflow-x: auto; padding: 0 14px 14px; scrollbar-width: none; }
.hourly-scroll::-webkit-scrollbar { display: none; }
.hourly-track { display: flex; gap: 5px; width: max-content; }

.hour-pill {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 11px 11px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 12px; min-width: 60px;
}
.hour-pill.now { border-color: var(--blue); box-shadow: 0 0 10px rgba(91,200,245,0.15); }
.hour-time { font-size: 11px; color: var(--text2); }
.hour-icon { font-size: 17px; }
.hour-temp { font-size: 14px; font-weight: 600; }
.hour-rain-pct { font-size: 11px; color: var(--blue); min-height: 14px; }

/* ── WEEK SECTION ── */
.week-section { padding: 0 16px 32px; }
.week-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text3); padding: 12px 4px 8px;
}
.day-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }

.day-row { border-radius: 16px; overflow: hidden; }

.day-summary {
  display: flex; align-items: center;
  padding: 15px 16px; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: background 0.15s; gap: 0;
}
.day-row.open .day-summary { border-radius: 16px 16px 0 0; border-bottom-color: transparent; }
.day-summary:active { background: var(--surfaceHover); }

.col-day { width: 100px; flex-shrink: 0; }
.col-day-name { font-size: 14px; font-weight: 500; }
.col-day-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
.col-icon { font-size: 22px; width: 34px; flex-shrink: 0; }
.col-temps { margin-left: auto; display: flex; align-items: baseline; gap: 8px; }
.temp-hi { font-size: 15px; font-weight: 600; }
.temp-lo { font-size: 13px; color: var(--text3); }
.col-chevron { margin-left: 12px; color: var(--text3); flex-shrink: 0; transition: transform 0.28s ease; }
.day-row.open .col-chevron { transform: rotate(180deg); }

/* ── EXPAND ── */
.day-detail { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
.day-row.open .day-detail { max-height: 900px; }

.detail-body {
  background: var(--surface); border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 16px 16px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  padding: 0 14px 14px;
}
.detail-divider { height: 1px; background: var(--border); margin-bottom: 12px; }
.detail-cond-line { font-size: 12px; color: var(--text2); line-height: 1.6; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }

.detail-stats { display: flex; gap: 6px; margin-bottom: 10px; }
.det-stat { flex: 1; background: var(--surface2); border-radius: 12px; padding: 10px 8px; text-align: center; border: 1px solid var(--border); }
.det-stat .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 4px; }
.det-stat .stat-val { font-size: 14px; font-weight: 600; }
.det-stat .stat-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

.expand-hourly-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 7px; }
.expand-hourly-scroll { overflow-x: auto; margin: 0 -4px; scrollbar-width: none; }
.expand-hourly-scroll::-webkit-scrollbar { display: none; }
.expand-hourly-track { display: flex; gap: 5px; width: max-content; padding: 0 4px 2px; }

.expand-sun { display: flex; gap: 6px; margin-top: 10px; }
.expand-sun-cell {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
}
.expand-sun-icon { font-size: 16px; }
.expand-sun-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
.expand-sun-time { font-size: 13px; font-weight: 600; }

/* ── STATUS ── */
.status { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 100px 24px; text-align: center; }
.status.active { display: flex; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  align-items: flex-end; backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg); border-radius: 22px 22px 0 0;
  padding: 24px 20px; width: 100%; border-top: 1px solid var(--border2);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
.modal-head { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text2); margin-bottom: 14px; }
.modal-row { display: flex; gap: 8px; }
.modal-input {
  flex: 1; padding: 13px 16px; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 12px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 15px; outline: none;
}
.modal-input::placeholder { color: var(--text3); }
.modal-input:focus { border-color: var(--blue); }
.modal-go {
  padding: 13px 20px; background: var(--blue); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
}
.modal-cancel {
  display: block; width: 100%; text-align: center;
  padding: 14px; background: none; border: none;
  font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text2); cursor: pointer;
}
.modal-err { font-size: 12px; color: #ef4444; margin-top: 8px; display: none; }

#weather { display: none; }
.fade { animation: fadeIn 0.5s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#080e18">
</head>
<body>

<div class="glow-layer">
  <div class="glow-top"></div>
  <div class="glow-mid"></div>
  <div class="glow-right"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="loc-btn" onclick="openModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
    <span class="loc-btn-text" id="nav-city">Perth</span>
  </button>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="outsideClose(event)">
  <div class="modal">
    <div class="modal-head">Change Location</div>
    <div class="modal-row">
      <input class="modal-input" id="city-input" type="text" placeholder="Enter a city…" />
      <button class="modal-go" onclick="changeCity()">Go</button>
    </div>
    <div class="modal-err" id="modal-err">City not found.</div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- LOADING -->
<div class="status active" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text2)">Loading forecast…</div>
</div>

<!-- WEATHER -->
<div id="weather">

  <!-- Hero -->
  <div class="hero-wrap fade">
    <div class="hero-icon" id="hero-icon">⛅</div>
    <div class="hero-temp" id="hero-temp">—<sup>°</sup></div>
    <div class="hero-cond" id="hero-cond">—</div>
    <div class="hero-hilo" id="hero-hilo">H:—° · L:—°</div>
  </div>

  <!-- Today panel -->
  <div class="today-panel fade">
    <!-- Stats -->
    <div class="today-stats">
      <div class="today-stat">
        <div class="stat-label">Wind</div>
        <div class="stat-val" id="t-wind">—</div>
        <div class="stat-sub" id="t-wind-dir">—</div>
      </div>
      <div class="today-stat">
        <div class="stat-label">Rain</div>
        <div class="stat-val" id="t-rain">—</div>
        <div class="stat-sub" id="t-rain-mm">—</div>
      </div>
      <div class="today-stat">
        <div class="stat-label">UV</div>
        <div class="stat-val" id="t-uv">—</div>
        <div class="stat-sub" id="t-uv-lbl">—</div>
      </div>
    </div>

    <!-- Hourly -->
    <div class="today-hourly-label">Hourly</div>
    <div class="hourly-scroll">
      <div class="hourly-track" id="today-hourly"></div>
    </div>

    <!-- Sun -->
    <div class="today-sun">
      <div class="sun-cell">
        <div class="sun-cell-icon">🌅</div>
        <div>
          <div class="sun-cell-label">Sunrise</div>
          <div class="sun-cell-time" id="t-sunrise">—</div>
        </div>
      </div>
      <div class="sun-cell">
        <div class="sun-cell-icon">🌇</div>
        <div>
          <div class="sun-cell-label">Sunset</div>
          <div class="sun-cell-time" id="t-sunset">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Week -->
  <div class="week-section">
    <div class="week-label">Next 6 Days</div>
    <ul class="day-list" id="day-list"></ul>
  </div>

</div>

<script>
const WMO={
  0:{l:'Clear Sky',i:'☀️',d:'Clear and sunny throughout the day.'},
  1:{l:'Mostly Clear',i:'🌤️',d:'Mainly clear with some high cloud.'},
  2:{l:'Partly Cloudy',i:'⛅',d:'A mix of sun and cloud.'},
  3:{l:'Overcast',i:'☁️',d:'Cloudy skies throughout the day.'},
  45:{l:'Foggy',i:'🌫️',d:'Fog patches, especially in the morning.'},
  48:{l:'Icy Fog',i:'🌫️',d:'Freezing fog possible. Take care on roads.'},
  51:{l:'Light Drizzle',i:'🌦️',d:'Occasional light drizzle.'},
  53:{l:'Drizzle',i:'🌦️',d:'Drizzle periods likely.'},
  55:{l:'Heavy Drizzle',i:'🌧️',d:'Heavy drizzle expected.'},
  61:{l:'Light Rain',i:'🌧️',d:'Light rain. An umbrella recommended.'},
  63:{l:'Rain',i:'🌧️',d:'Rain periods throughout the day.'},
  65:{l:'Heavy Rain',i:'🌧️',d:'Heavy rain. Possible flooding.'},
  71:{l:'Light Snow',i:'🌨️',d:'Light snow possible.'},
  73:{l:'Snow',i:'❄️',d:'Snow expected. Dress warmly.'},
  75:{l:'Heavy Snow',i:'❄️',d:'Heavy snowfall. Travel disruptions likely.'},
  77:{l:'Snow Grains',i:'🌨️',d:'Snow grains, light accumulation possible.'},
  80:{l:'Light Showers',i:'🌦️',d:'Scattered light showers.'},
  81:{l:'Showers',i:'🌧️',d:'Shower periods expected.'},
  82:{l:'Heavy Showers',i:'⛈️',d:'Heavy showers, some thundery.'},
  85:{l:'Snow Showers',i:'🌨️',d:'Snow showers possible.'},
  86:{l:'Heavy Snow Showers',i:'❄️',d:'Heavy snow showers expected.'},
  95:{l:'Thunderstorm',i:'⛈️',d:'Thunderstorms likely.'},
  96:{l:'T-Storm & Hail',i:'⛈️',d:'Thunderstorms with hail possible.'},
  99:{l:'Severe T-Storm',i:'⛈️',d:'Severe thunderstorm with large hail.'},
};
function w(c){return WMO[c]||{l:'Unknown',i:'🌡️',d:''};}

const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let lat=-31.9505,lon=115.8605,city='Perth',region='Western Australia';
let dark=true;

function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
}
function fmtTime(iso){if(!iso)return'—';return new Date(iso).toLocaleTimeString([],{hour:'numeric',minute:'2-digit',hour12:true});}
function fmtHour(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString([],{hour:'numeric',hour12:true});}
function compass(d){if(d==null)return'';return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];}
function uvLbl(u){return u<=2?'Low':u<=5?'Moderate':u<=7?'High':u<=10?'Very High':'Extreme';}
function uvClr(u){return u<=2?'var(--green)':u<=5?'var(--accent)':u<=7?'#f97316':'#ef4444';}

function showState(id){
  document.getElementById('loading').classList.toggle('active',id==='loading');
  document.getElementById('weather').style.display=id==='weather'?'block':'none';
}

async function load(la,lo,c,r){
  showState('loading');
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${la}&longitude=${lo}`
      +`&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m`
      +`&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max,sunrise,sunset`
      +`&hourly=temperature_2m,weather_code,precipitation_probability`
      +`&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto&forecast_days=7`;
    const data=await(await fetch(url)).json();
    render(data,c,r);
    showState('weather');
  }catch{
    document.getElementById('loading').innerHTML='<div style="font-size:13px;color:var(--text2)">Failed to load. Try again.</div>';
  }
}

function buildHourlyPills(hours, isToday){
  const nowMs=Date.now();
  const filtered=hours.filter(hh=>new Date(hh.iso).getHours()>=6);
  return filtered.map(hh=>{
    const isNow=isToday&&Math.abs(new Date(hh.iso)-nowMs)<1800000;
    return `<div class="hour-pill${isNow?' now':''}">
      <div class="hour-time">${isNow?'Now':fmtHour(hh.iso)}</div>
      <div class="hour-icon">${w(hh.code).i}</div>
      <div class="hour-temp">${Math.round(hh.temp)}°</div>
      <div class="hour-rain-pct">${hh.rain>0?hh.rain+'%':''}</div>
    </div>`;
  }).join('');
}

function render(data,c,r){
  const d=data.daily,h=data.hourly,cur=data.current;
  const today=new Date();

  document.getElementById('nav-city').textContent=c;

  // Hero — use actual current temp & condition
  const currentTemp=Math.round(cur.temperature_2m);
  const currentCode=cur.weather_code;
  document.getElementById('hero-icon').textContent=w(currentCode).i;
  document.getElementById('hero-temp').innerHTML=`${currentTemp}<sup>°</sup>`;
  document.getElementById('hero-cond').textContent=w(currentCode).l;
  document.getElementById('hero-hilo').textContent=`H:${Math.round(d.temperature_2m_max[0])}°  ·  L:${Math.round(d.temperature_2m_min[0])}°`;

  // Today stats
  const wind0=Math.round(d.wind_speed_10m_max[0]);
  const dir0=compass(d.wind_direction_10m_dominant[0]);
  const rain0=d.precipitation_probability_max[0]??0;
  const rainMm0=(d.precipitation_sum[0]??0).toFixed(1);
  const uv0=Math.round(d.uv_index_max[0]??0);
  document.getElementById('t-wind').textContent=`${wind0} km/h`;
  document.getElementById('t-wind-dir').textContent=dir0;
  document.getElementById('t-rain').textContent=`${rain0}%`;
  document.getElementById('t-rain-mm').textContent=`${rainMm0}mm`;
  document.getElementById('t-uv').innerHTML=`<span style="color:${uvClr(uv0)}">${uv0}</span>`;
  document.getElementById('t-uv-lbl').textContent=uvLbl(uv0);
  document.getElementById('t-sunrise').textContent=fmtTime(d.sunrise[0]);
  document.getElementById('t-sunset').textContent=fmtTime(d.sunset[0]);

  // Today hourly
  const todayKey=d.sunrise[0]?d.sunrise[0].slice(0,10):today.toISOString().slice(0,10);
  const hourlyByDay={};
  for(let i=0;i<h.time.length;i++){
    const day=h.time[i].slice(0,10);
    if(!hourlyByDay[day]) hourlyByDay[day]=[];
    hourlyByDay[day].push({iso:h.time[i],temp:h.temperature_2m[i],code:h.weather_code[i],rain:h.precipitation_probability[i]});
  }
  document.getElementById('today-hourly').innerHTML=buildHourlyPills(hourlyByDay[todayKey]||[],true);

  // Days 1–6
  const list=document.getElementById('day-list');
  list.innerHTML='';
  for(let i=1;i<7;i++){
    const date=new Date(today); date.setDate(today.getDate()+i);
    const ww=w(d.weather_code[i]);
    const hi=Math.round(d.temperature_2m_max[i]),lo=Math.round(d.temperature_2m_min[i]);
    const rain=d.precipitation_probability_max[i]??0;
    const rainMm=(d.precipitation_sum[i]??0).toFixed(1);
    const wind=Math.round(d.wind_speed_10m_max[i]);
    const dir=compass(d.wind_direction_10m_dominant[i]);
    const uv=Math.round(d.uv_index_max[i]??0);
    const dayKey=d.sunrise[i]?d.sunrise[i].slice(0,10):null;
    const riseStr=fmtTime(d.sunrise[i]),setStr=fmtTime(d.sunset[i]);
    const dayLabel=i===1?'Tomorrow':DAYS[date.getDay()];
    const dateStr=`${date.getDate()} ${MONS[date.getMonth()]}`;
    const hours=hourlyByDay[dayKey]||[];

    const hourlyHtml=hours.length?`
      <div class="expand-hourly-label">Hourly</div>
      <div class="expand-hourly-scroll"><div class="expand-hourly-track">${buildHourlyPills(hours,false)}</div></div>
    `:'';

    const li=document.createElement('li');
    li.className='day-row';
    li.innerHTML=`
      <div class="day-summary" onclick="toggle(this.parentElement)">
        <div class="col-day">
          <div class="col-day-name">${dayLabel}</div>
          <div class="col-day-date">${dateStr}</div>
        </div>
        <div class="col-icon">${ww.i}</div>
        <div class="col-temps">
          <span class="temp-hi">${hi}°</span>
          <span class="temp-lo">${lo}°</span>
        </div>
        <svg class="col-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="day-detail">
        <div class="detail-body">
          <div class="detail-divider"></div>
          <div class="detail-cond-line">${ww.d}</div>
          <div class="detail-stats">
            <div class="det-stat">
              <div class="stat-label">Wind</div>
              <div class="stat-val">${wind} <span style="font-size:10px;font-weight:400">km/h</span></div>
              <div class="stat-sub">${dir}</div>
            </div>
            <div class="det-stat">
              <div class="stat-label">Rain</div>
              <div class="stat-val">${rain}<span style="font-size:10px;font-weight:400">%</span></div>
              <div class="stat-sub">${rainMm}mm</div>
            </div>
            <div class="det-stat">
              <div class="stat-label">UV</div>
              <div class="stat-val" style="color:${uvClr(uv)}">${uv}</div>
              <div class="stat-sub">${uvLbl(uv)}</div>
            </div>
          </div>
          ${hourlyHtml}
          <div class="expand-sun">
            <div class="expand-sun-cell">
              <span class="expand-sun-icon">🌅</span>
              <div><div class="expand-sun-label">Sunrise</div><div class="expand-sun-time">${riseStr}</div></div>
            </div>
            <div class="expand-sun-cell">
              <span class="expand-sun-icon">🌇</span>
              <div><div class="expand-sun-label">Sunset</div><div class="expand-sun-time">${setStr}</div></div>
            </div>
          </div>
        </div>
      </div>`;
    list.appendChild(li);
  }
}

function toggle(row){
  const open=row.classList.contains('open');
  document.querySelectorAll('.day-row.open').forEach(r=>r.classList.remove('open'));
  if(!open) row.classList.add('open');
}

function openModal(){document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('city-input').focus(),100);}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modal-err').style.display='none';}
function outsideClose(e){if(e.target===document.getElementById('modal'))closeModal();}

async function changeCity(){
  const val=document.getElementById('city-input').value.trim();
  if(!val) return;
  document.getElementById('modal-err').style.display='none';
  try{
    const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(val)}&count=1&language=en&format=json`);
    const data=await res.json();
    if(!data.results?.length) throw 0;
    const r=data.results[0];
    lat=r.latitude;lon=r.longitude;city=r.name;region=r.admin1||r.country||'';
    closeModal();
    document.getElementById('city-input').value='';
    load(lat,lon,city,region);
  }catch{document.getElementById('modal-err').style.display='block';}
}
document.getElementById('city-input').addEventListener('keydown',e=>{if(e.key==='Enter')changeCity();});

load(lat,lon,city,region);
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>
